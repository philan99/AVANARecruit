kind = "web"
previewPath = "/"
title = "TalentMatch - AI Job Matching"
version = "1.0.0"
id = "artifacts/web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22333

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/web", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "artifacts/web/server.mjs"]

[services.production.run.env]
PORT = "22333"
NODE_ENV = "production"

[services.env]
PORT = "22333"
BASE_PATH = "/"
